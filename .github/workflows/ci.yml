name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================================
  # BACKEND SETUP & TESTS
  # ============================================================================
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio black isort flake8

      - name: Lint with black
        working-directory: ./backend
        run: black --check .
        continue-on-error: true

      - name: Check imports with isort
        working-directory: ./backend
        run: isort --check-only .
        continue-on-error: true

      - name: Lint with flake8
        working-directory: ./backend
        run: flake8 . --max-line-length=100 --ignore=E203,W503
        continue-on-error: true

      - name: Verify Python syntax
        working-directory: ./backend
        run: python -m py_compile $(find . -name "*.py" -type f)

      - name: Check for security issues
        working-directory: ./backend
        run: pip install bandit && bandit -r . -ll
        continue-on-error: true

  # ============================================================================
  # FRONTEND SETUP & TESTS
  # ============================================================================
  frontend:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Check TypeScript
        working-directory: ./frontend
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint with ESLint
        working-directory: ./frontend
        run: npm run lint 2>/dev/null || echo "No ESLint config"
        continue-on-error: true

      - name: Check format with Prettier
        working-directory: ./frontend
        run: npx prettier --check src/ 2>/dev/null || echo "No Prettier config"
        continue-on-error: true

      - name: Build production
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
        run: npm run build

      - name: Check bundle size
        working-directory: ./frontend
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          echo "📦 Frontend build size: $SIZE"

      - name: Save build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 30

  # ============================================================================
  # CODE QUALITY & SECURITY
  # ============================================================================
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Check for git secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

  # ============================================================================
  # FINAL STATUS CHECK
  # ============================================================================
  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [backend, frontend, quality]
    if: always()

    steps:
      - name: Check CI Status
        run: |
          if [ "${{ needs.backend.result }}" = "failure" ] || [ "${{ needs.frontend.result }}" = "failure" ]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          fi
          echo "✅ CI Pipeline Passed"

      - name: Comment PR on success
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ CI/CD pipeline passed! This PR is ready for review.'
            })
